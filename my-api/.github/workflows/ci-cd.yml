name: Smoketest project v3 CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest

      - name: Docker build
        run: |
          docker build -t smoketest-project-v3 .

      - name: Docker push
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker push to registry
        run: |
          docker tag smoketest-project-v3:latest ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest
          docker push ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest

      - name: Security scanning
        uses: aquasecurity/trivy-action@v1
        with:
          image-ref: ${{ secrets.DOCKER_IMAGE_NAME }}

      - name: Deploy to staging
        uses: appleboy/ssh-action@v0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest
            docker run -d -p 80:80 ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest

      - name: Deploy to production
        uses: appleboy/ssh-action@v0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USERNAME }}
          key: ${{ secrets.PRODUCTION_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest
            docker run -d -p 80:80 ${{ secrets.DOCKER_REGISTRY }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest

This YAML file defines a GitHub Actions workflow that performs the following tasks:

1.  **Checkout code**: The workflow starts by checking out the code in the repository.
2.  **Setup Python**: It then sets up a Python environment using the `actions/setup-python` action.
3.  **Install dependencies**: The workflow installs the dependencies specified in the `requirements.txt` file.
4.  **Run tests**: It runs the tests using the `pytest` command.
5.  **Docker build**: The workflow builds a Docker image using the `docker build` command.
6.  **Docker push**: It pushes the Docker image to a registry using the `docker/login-action` and `docker push` commands.
7.  **Security scanning**: The workflow performs security scanning using the `aquasecurity/trivy-action`.
8.  **Deploy to staging**: It deploys the application to a staging environment using the `appleboy/ssh-action`.
9.  **Deploy to production**: Finally, the workflow deploys the application to a production environment using the `appleboy/ssh-action`.

This workflow assumes that you have already set up the necessary secrets in your GitHub repository, such as the Docker registry credentials, staging and production host credentials, and SSH keys. You will need to replace the placeholders in the YAML file with the actual values for your project.