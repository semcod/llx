version: '3'

services:
  app:
    build: .
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/mydb
      - REDIS_URL=redis://redis:6379/0
      - PROMETHEUS_URL=http://prometheus:9090
      - GRAFANA_URL=http://grafana:3000
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
      - prometheus
      - grafana
    volumes:
      - ./app:/app
      - ./logs:/logs

  db:
    image: postgres
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mydb
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command: --config.file=/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SERVER_HTTP_PORT=3000
      - GF_SERVER_ROOT_URL=http://localhost:3000

volumes:
  db-data:

This `docker-compose.yml` file defines a multi-container application with the following components:

*   `app`: The application container, built from the current directory (`.`) and linked to the other services.
*   `db`: A PostgreSQL database container, with environment variables for the database user, password, and database name.
*   `redis`: A Redis container for caching, with the default port exposed.
*   `prometheus`: A Prometheus container for monitoring, with a custom configuration file (`prometheus.yml`) mounted as a volume.
*   `grafana`: A Grafana container for visualization, with the default port exposed and a custom root URL.

The `volumes` section defines a named volume (`db-data`) for the PostgreSQL database data. The `app` container mounts the current directory (`./app`) as a volume, and the `logs` directory is also mounted for logging purposes.

Note that you'll need to create a `prometheus.yml` file in the same directory as the `docker-compose.yml` file, with the correct configuration for Prometheus.