domain: software
goal:
  delivery:
  - Complete in sprints
  - Review changes
  metrics:
  - Complexity reduction
  - Test coverage
  quality:
  - Reduce complexity
  - Improve maintainability
  short: Improve improvement
goals:
- Reduce technical debt
- Improve code readability
- Increase test coverage
- Ensure maintainability
name: Refactoring Strategy
project:
  name: ExampleProject
  type: Refactoring
project_type: python
quality_gates:
- criteria:
  - Quality gate 1
  description: Quality gate 1
  gate: Linting
  name: Quality gate 1
  required: true
  threshold: Zero new warnings
- criteria:
  - Quality gate 2
  description: Quality gate 2
  gate: Complexity
  name: Quality gate 2
  required: true
  threshold: Average cyclomatic complexity < 5 per function
- criteria:
  - Quality gate 3
  description: Quality gate 3
  gate: TestCoverage
  name: Quality gate 3
  required: true
  threshold: Overall coverage >= 80%
- criteria:
  - Quality gate 4
  description: Quality gate 4
  gate: Duplication
  name: Quality gate 4
  required: true
  threshold: No duplicated blocks > 10 lines
sprints:
- id: 1
  name: Sprint 1
  number: 1
  objectives:
  - Analyze current codebase
  - Identify duplication and dead code
  - Create refactoring backlog
  tasks:
  - description: 'Execute {''pattern'': ''analyzefile'', ''description'': ''review
      a single file for smells, duplication, and complexity'', ''steps'': [''run linting'',
      ''run complexity metrics'', ''document findings'']}'
    model_hints: balanced
    name: '{''pattern'': ''AnalyzeFile'', ''description'': ''Review a single file
      for smells, duplication, and complexity'', ''steps'': [''Run linting'', ''Run
      complexity metrics'', ''Document findings'']}'
    type: feature
  - description: 'Execute {''pattern'': ''extractmethod'', ''description'': ''identify
      a block of code to extract into a new function'', ''steps'': [''select cohesive
      block'', ''create new function with clear name'', ''replace block with call'',
      ''add unit test for new function'']}'
    model_hints: cheap
    name: '{''pattern'': ''ExtractMethod'', ''description'': ''Identify a block of
      code to extract into a new function'', ''steps'': [''Select cohesive block'',
      ''Create new function with clear name'', ''Replace block with call'', ''Add
      unit test for new function'']}'
    type: tech_debt
  - description: 'Execute {''pattern'': ''addunittest'', ''description'': ''write
      unit test for a function or module'', ''steps'': [''identify test scenarios'',
      ''write test using existing framework'', ''run test to ensure passes'', ''commit
      with descriptive message'']}'
    model_hints: cheap
    name: '{''pattern'': ''AddUnitTest'', ''description'': ''Write unit test for a
      function or module'', ''steps'': [''Identify test scenarios'', ''Write test
      using existing framework'', ''Run test to ensure passes'', ''Commit with descriptive
      message'']}'
    type: feature
- id: 2
  name: Sprint 2
  number: 2
  objectives:
  - Extract common utilities
  - Simplify complex functions
  - Introduce unit tests for refactored modules
  tasks:
  - description: 'Execute {''pattern'': ''analyzefile'', ''description'': ''review
      a single file for smells, duplication, and complexity'', ''steps'': [''run linting'',
      ''run complexity metrics'', ''document findings'']}'
    model_hints: balanced
    name: '{''pattern'': ''AnalyzeFile'', ''description'': ''Review a single file
      for smells, duplication, and complexity'', ''steps'': [''Run linting'', ''Run
      complexity metrics'', ''Document findings'']}'
    type: feature
  - description: 'Execute {''pattern'': ''extractmethod'', ''description'': ''identify
      a block of code to extract into a new function'', ''steps'': [''select cohesive
      block'', ''create new function with clear name'', ''replace block with call'',
      ''add unit test for new function'']}'
    model_hints: cheap
    name: '{''pattern'': ''ExtractMethod'', ''description'': ''Identify a block of
      code to extract into a new function'', ''steps'': [''Select cohesive block'',
      ''Create new function with clear name'', ''Replace block with call'', ''Add
      unit test for new function'']}'
    type: tech_debt
  - description: 'Execute {''pattern'': ''addunittest'', ''description'': ''write
      unit test for a function or module'', ''steps'': [''identify test scenarios'',
      ''write test using existing framework'', ''run test to ensure passes'', ''commit
      with descriptive message'']}'
    model_hints: cheap
    name: '{''pattern'': ''AddUnitTest'', ''description'': ''Write unit test for a
      function or module'', ''steps'': [''Identify test scenarios'', ''Write test
      using existing framework'', ''Run test to ensure passes'', ''Commit with descriptive
      message'']}'
    type: feature
- id: 3
  name: Sprint 3
  number: 3
  objectives:
  - Apply consistent naming and style
  - Run static analysis and fix violations
  - Final review and documentation update
  tasks:
  - description: 'Execute {''pattern'': ''analyzefile'', ''description'': ''review
      a single file for smells, duplication, and complexity'', ''steps'': [''run linting'',
      ''run complexity metrics'', ''document findings'']}'
    model_hints: balanced
    name: '{''pattern'': ''AnalyzeFile'', ''description'': ''Review a single file
      for smells, duplication, and complexity'', ''steps'': [''Run linting'', ''Run
      complexity metrics'', ''Document findings'']}'
    type: feature
  - description: 'Execute {''pattern'': ''extractmethod'', ''description'': ''identify
      a block of code to extract into a new function'', ''steps'': [''select cohesive
      block'', ''create new function with clear name'', ''replace block with call'',
      ''add unit test for new function'']}'
    model_hints: cheap
    name: '{''pattern'': ''ExtractMethod'', ''description'': ''Identify a block of
      code to extract into a new function'', ''steps'': [''Select cohesive block'',
      ''Create new function with clear name'', ''Replace block with call'', ''Add
      unit test for new function'']}'
    type: tech_debt
  - description: 'Execute {''pattern'': ''addunittest'', ''description'': ''write
      unit test for a function or module'', ''steps'': [''identify test scenarios'',
      ''write test using existing framework'', ''run test to ensure passes'', ''commit
      with descriptive message'']}'
    model_hints: cheap
    name: '{''pattern'': ''AddUnitTest'', ''description'': ''Write unit test for a
      function or module'', ''steps'': [''Identify test scenarios'', ''Write test
      using existing framework'', ''Run test to ensure passes'', ''Commit with descriptive
      message'']}'
    type: feature
task_patterns:
- description: Review a single file for smells, duplication, and complexity
  pattern: AnalyzeFile
  steps:
  - Run linting
  - Run complexity metrics
  - Document findings
- description: Identify a block of code to extract into a new function
  pattern: ExtractMethod
  steps:
  - Select cohesive block
  - Create new function with clear name
  - Replace block with call
  - Add unit test for new function
- description: Write unit test for a function or module
  pattern: AddUnitTest
  steps:
  - Identify test scenarios
  - Write test using existing framework
  - Run test to ensure passes
  - Commit with descriptive message
