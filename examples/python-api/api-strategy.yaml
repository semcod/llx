name: Simple Python REST API
version: "1.0.0"
project_type: api
domain: backend
description: >
  A simple REST API built with FastAPI covering the full development lifecycle:
  specification, implementation, testing, deployment and monitoring.

goal:
  short: "Build a simple Python REST API with FastAPI"
  quality:
    - "All endpoints documented with OpenAPI"
    - "Code coverage > 80%"
    - "No critical security vulnerabilities"
  delivery:
    - "Dockerized and deployable in one command"
    - "CI/CD pipeline configured"
    - "Health-check and metrics endpoint available"
  metrics:
    - "Response time < 200ms on happy paths"
    - "All tests passing in CI"

sprints:
  - id: 1
    name: "Specification & Architecture"
    length_days: 7
    objectives:
      - "Define REST API endpoints and HTTP methods"
      - "Design Pydantic data models and schemas"
      - "Set up project structure (FastAPI, uvicorn, poetry/pip)"
      - "Create OpenAPI spec draft"

  - id: 2
    name: "Implementation"
    length_days: 14
    objectives:
      - "Implement CRUD endpoints with FastAPI routers"
      - "Add Pydantic request/response models with validation"
      - "Configure storage layer (SQLite/PostgreSQL via SQLAlchemy)"
      - "Add error handling and HTTP exception middleware"

  - id: 3
    name: "Testing"
    length_days: 7
    objectives:
      - "Write unit tests with pytest"
      - "Write integration tests using FastAPI TestClient"
      - "Achieve code coverage > 80% (pytest-cov)"
      - "Add linting (ruff) and type checks (mypy)"

  - id: 4
    name: "Deploy & Monitoring"
    length_days: 7
    objectives:
      - "Write Dockerfile and docker-compose.yml"
      - "Configure CI/CD (GitHub Actions)"
      - "Add /health and /metrics endpoints"
      - "Set up basic logging and request tracing"

tasks:
  patterns:
    - id: spec-openapi
      type: feature
      title: "Design OpenAPI specification"
      description: "Define all endpoints, request/response schemas and authentication strategy"
      priority: high
      estimate: "2d"
      labels: [spec, openapi]
      model_hints:
        design: balanced
        implementation: cheap

    - id: impl-crud
      type: feature
      title: "Implement CRUD endpoints"
      description: "FastAPI routers with full CRUD operations and Pydantic models"
      priority: high
      estimate: "5d"
      labels: [implementation, fastapi]
      model_hints:
        design: cheap
        implementation: cheap
        review: free

    - id: impl-db
      type: feature
      title: "Configure database layer"
      description: "SQLAlchemy models, migrations with Alembic, async session management"
      priority: high
      estimate: "3d"
      labels: [implementation, database]
      model_hints:
        design: balanced
        implementation: cheap

    - id: test-unit
      type: feature
      title: "Write unit tests"
      description: "Pytest unit tests for business logic, validators, and helpers"
      priority: high
      estimate: "2d"
      labels: [testing, pytest]
      model_hints:
        implementation: free

    - id: test-integration
      type: feature
      title: "Write integration tests"
      description: "FastAPI TestClient tests covering all endpoints and edge cases"
      priority: high
      estimate: "2d"
      labels: [testing, integration]
      model_hints:
        implementation: cheap

    - id: deploy-docker
      type: chore
      title: "Dockerize application"
      description: "Multi-stage Dockerfile, docker-compose for local dev and production"
      priority: medium
      estimate: "1d"
      labels: [deploy, docker]
      model_hints:
        implementation: free

    - id: deploy-monitoring
      type: chore
      title: "Add health-check and metrics"
      description: "/health endpoint, /metrics with prometheus-fastapi-instrumentator"
      priority: medium
      estimate: "1d"
      labels: [monitoring, observability]
      model_hints:
        design: cheap
        implementation: free

quality_gates:
  - name: "Specification Complete"
    description: "OpenAPI spec reviewed and approved before implementation starts"
    criteria:
      - "openapi.yaml exists and is valid"
      - "All endpoints documented with request/response examples"
    required: true

  - name: "Code Quality"
    description: "Code passes linting and type checks"
    criteria:
      - "ruff check passes with zero errors"
      - "mypy returns no errors"
    required: true

  - name: "Test Coverage"
    description: "Minimum acceptable test coverage"
    criteria:
      - "pytest --cov reports >= 80%"
      - "All integration tests pass"
    required: true

  - name: "Production Ready"
    description: "Application can be deployed and monitored"
    criteria:
      - "Docker image builds successfully"
      - "/health returns 200 OK"
      - "CI/CD pipeline green"
    required: true
