# Development Docker Compose configuration
# Uses local Ollama instead of containerized version

services:
  # Core llx API
  llx-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder  # Use development stage
    container_name: llx-api-dev
    ports:
      - "4000:4000"
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - HOT_RELOAD=true
      - LITELLM_PROXY_HOST=0.0.0.0
      - LITELLM_PROXY_PORT=4000
      - LITELLM_PROXY_MASTER_KEY=sk-proxy-local-dev
      # Use local Ollama
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    env_file:
      - .env
    volumes:
      - ./:/app  # Mount entire project for development
      - /app/.venv  # Exclude virtual environment
      - ./logs:/app/logs
      - llx_cache:/app/cache
      # Mount local Ollama models directory if needed
      - ~/.ollama:/root/.ollama:ro
    networks:
      - llx-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python -m llx proxy start

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: llx-redis-dev
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - llx-network
    restart: unless-stopped

  # VS Code for development
  vscode:
    image: codercom/code-server:latest
    container_name: llx-vscode-dev
    ports:
      - "8080:8080"
    environment:
      - PASSWORD=${VSCODE_PASSWORD:-llx-dev}
      - DEFAULT_WORKSPACE=/home/coder/project
      - DOCKER_USER=vscode
      - SHELL=/bin/bash
    env_file:
      - ./.env
    volumes:
      - vscode_data:/home/coder
      - ./:/home/coder/project
      - ./.env:/home/coder/.env:ro
      - ./docker/vscode/settings.json:/home/coder/.local/share/code-server/User/settings.json
      - ./docker/vscode/install-extensions.sh:/home/coder/install-extensions.sh:ro
      - vscode_extensions:/home/coder/.local/share/code-server/extensions
    networks:
      - llx-network
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-c"]
    command: |
      echo "🔧 Setting up VS Code with RooCode..."
      # Install extensions
      if [ -f "/home/coder/install-extensions.sh" ]; then
        bash /home/coder/install-extensions.sh
      else
        echo "⚠️  Extensions script not found"
      fi
      # Start code-server
      exec /usr/bin/entrypoint.sh --bind-addr=0.0.0.0:8080

  # AI Tools Shell Environment (Aider, Claude Code, Cursor, etc.)
  ai-tools:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: llx-ai-tools-dev
    environment:
      - DEBUG=true
      - LOG_LEVEL=INFO
      # llx API Configuration
      - LITELLM_PROXY_HOST=0.0.0.0
      - LITELLM_PROXY_PORT=4000
      - LITELLM_PROXY_MASTER_KEY=sk-proxy-local-dev
      # Local Ollama
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # AI Tool Configuration
      - OPENAI_API_KEY=sk-proxy-local-dev
      - OPENAI_API_BASE=http://llx-api:4000/v1
      - ANTHROPIC_API_KEY=sk-proxy-local-dev
      - ANTHROPIC_BASE_URL=http://llx-api:4000/v1
      # Aider Configuration
      - AIDER_MODEL=qwen2.5-coder:7b
      - AIDER_API_KEY=sk-proxy-local-dev
      - AIDER_API_BASE=http://llx-api:4000/v1
      # Claude Code Configuration
      - CLAUDE_API_KEY=sk-proxy-local-dev
      - CLAUDE_API_BASE=http://llx-api:4000/v1
      - CLAUDE_MODEL=qwen2.5-coder:7b
      # Cursor Configuration
      - CURSOR_API_KEY=sk-proxy-local-dev
      - CURSOR_API_BASE=http://llx-api:4000/v1
      - CURSOR_MODEL=qwen2.5-coder:7b
      # Git Configuration
      - GIT_AUTHOR_NAME=llx-ai-tools
      - GIT_AUTHOR_EMAIL=ai-tools@llx.local
      - GIT_COMMITTER_NAME=llx-ai-tools
      - GIT_COMMITTER_EMAIL=ai-tools@llx.local
    env_file:
      - ./.env
    volumes:
      - ./:/workspace
      - /workspace/.venv
      - ai_tools_data:/root/.cache
      - ai_tools_git:/root/.gitconfig
      - ~/.ssh:/root/.ssh:ro
      - ~/.gitconfig:/root/.gitconfig:ro
      # Mount AI tool configurations
      - ./docker/ai-tools:/root/ai-tools-config:ro
    networks:
      - llx-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["/root/ai-tools-config/entrypoint.sh"]
    command: ["/root/ai-tools-config/install-tools.sh", "sleep", "infinity"]
    working_dir: /workspace

networks:
  llx-network:
    driver: bridge

volumes:
  redis_data:
  vscode_data:
  vscode_extensions:
  llx_cache:
  ai_tools_data:
  ai_tools_git:
