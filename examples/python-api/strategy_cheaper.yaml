  description: Quality gate 2
  gate: Test Coverage Threshold
  name: Quality gate 2
  required: true
- condition: All endpoints must comply with OpenAPI specification
  criteria:
  - Quality gate 3
  description: Quality gate 3
  gate: API Contract Validation
  name: Quality gate 3
  required: true
