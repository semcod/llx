name: "Simple Refactoring Strategy"
project_type: "python"
domain: "software"

sprints:
  - id: 1
    name: "First Sprint"
    objectives:
      - "Reduce complexity"
      - "Add tests"
    task_patterns:
      - name: "Complexity Analysis"
        description: "Analyze code complexity"
        task_type: "feature"
        model_hints:
          implementation: "balanced"
      - name: "Extract Method"
        description: "Extract complex methods"
        task_type: "tech_debt"
        model_hints:
          implementation: "balanced"
      - name: "Add Tests"
        description: "Add unit tests"
        task_type: "feature"
        model_hints:
          implementation: "cheap"

  - id: 2
    name: "Second Sprint"
    objectives:
      - "Clean up code"
      - "Document changes"
    task_patterns:
      - name: "Remove Duplicates"
        description: "Remove duplicate code"
        task_type: "tech_debt"
        model_hints:
          implementation: "cheap"
      - name: "Documentation"
        description: "Update documentation"
        task_type: "documentation"
        model_hints:
          implementation: "cheap"
