goal:
  description: Improve code quality
  title: Project Refactoring
goals:
- Reduce cyclomatic complexity to below 0.5 per module
- Improve code readability and maintainability
- "Establish automated test coverage \u2265 80%"
- Document refactored components for future developers
metadata:
  created_at: '2026-03-26T18:36:22.642371'
  version: '1.0'
project_name: ExampleApp
project_type: Web Application
quality_gates:
- criteria:
  - Quality gate 1
  description: Quality gate 1
  gate: Maximum Cyclomatic Complexity
  metric: average per module
  name: Quality gate 1
  required: true
  threshold: 0.5
- criteria:
  - Quality gate 2
  description: Quality gate 2
  gate: Unit Test Coverage
  metric: line coverage
  name: Quality gate 2
  required: true
  threshold: 80%
- criteria:
  - Quality gate 3
  description: Quality gate 3
  gate: Linting Errors
  metric: ESLint/Prettier issues
  name: Quality gate 3
  required: true
  threshold: 0
- criteria:
  - Quality gate 4
  description: Quality gate 4
  gate: Documentation Completeness
  metric: public API members with JSDoc
  name: Quality gate 4
  required: true
  threshold: 100%
sprints:
- id: 1
  name: Sprint 1
  number: 1
  objectives:
  - Perform initial complexity analysis and identify hotspots
  - Extract duplicated logic into reusable functions
  - Introduce unit tests for refactored modules
  tasks:
  - "Analyze complexity metrics using static analysis tool      - Refactor high\u2011\
    complexity functions (\u2265 1.0) into smaller units"
  - Replace repeated code blocks with shared utilities
  - Write unit tests covering new and modified code
  - "Review changes in pair\u2011programming sessions"
- id: 2
  name: Sprint 2
  number: 2
  objectives:
  - Further simplify remaining complex sections
  - Enforce coding standards and documentation
  - Validate quality gates and prepare for release
  tasks:
  - "Re\u2011run complexity analysis to verify targets met"
  - Apply consistent naming and formatting rules (e.g., ESLint/Prettier)
  - Add inline documentation for public APIs
  - "Increase test coverage to \u2265 80% via additional tests"
  - "Conduct final code review and sign\u2011off"
task_patterns:
- description: Identify a code block with a single responsibility and move it to a
    newly named function.
  pattern: Extract Function
- description: Find identical or similar code segments and replace with a call to
    a shared utility.
  pattern: Replace Duplicate Code
- description: For each refactored unit, write a test covering typical and edge cases.
  pattern: Introduce Unit Test
- description: Run linter/formatter and fix all reported issues.
  pattern: Apply Coding Standard
