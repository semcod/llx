  name: Sprint 1
  number: 1
  objectives:
  - Analyze existing API endpoints and extract common request/response structures
  - Introduce a shared DTO module for payload definitions
  - Add unit tests for the new DTOs
  tasks:
  - description: 'Execute {''pattern'': ''create/update dto'', ''description'': ''define
      a typescript interface or class representing request/response payload''}'
    model_hints: cheap
    name: '{''pattern'': ''Create/Update DTO'', ''description'': ''Define a TypeScript
      interface or class representing request/response payload''}'
    type: feature
  - description: 'Execute {''pattern'': ''add validation middleware'', ''description'':
