pipeline:
  name: llx-quality-loop

  # Quality gates — pipeline iterates until ALL pass
  metrics:
    coverage_min: 10     # test coverage (%) - llx current: ~15%

  # Pipeline stages — executed in order
  stages:
    - name: test
      run: pytest tests/ -v --cov=llx --cov-report=json:.pyqual/coverage.json
      when: always

  # Loop behavior
  loop:
    max_iterations: 1
    on_fail: report
