# Production Docker Compose configuration
# Includes all services with production settings

version: '3.8'

services:
  # Core llx API
  llx-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: llx:latest
    container_name: llx-api-prod
    ports:
      - "4000:4000"
    environment:
      - DEBUG=false
      - LOG_LEVEL=INFO
      - LITELLM_PROXY_HOST=0.0.0.0
      - LITELLM_PROXY_PORT=4000
      - LITELLM_PROXY_MASTER_KEY=${LLX_PROXY_MASTER_KEY}
      # Use local Ollama
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    env_file:
      - .env.prod
    volumes:
      - ./llx.yaml:/app/llx.yaml:ro
      - ./litellm-config.yaml:/app/litellm-config.yaml:ro
      - ./logs:/app/logs
      - llx_cache:/app/cache
      # Mount local Ollama models directory for access
      - ~/.ollama:/root/.ollama:ro
    networks:
      - llx-network
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Redis with persistence
  redis:
    image: redis:7-alpine
    container_name: llx-redis-prod
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./backups/redis:/backups
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - llx-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # PostgreSQL for data persistence
  postgres:
    image: postgres:15-alpine
    container_name: llx-postgres-prod
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./backups/postgres:/backups
    networks:
      - llx-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Ollama for local models (running on host)
  # Note: Ollama runs on host machine, not in container
  # llx-api connects to host.docker.internal:11434

  # WebUI
  webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: llx-webui-prod
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - WEBUI_NAME=llx WebUI
      - WEBUI_DESCRIPTION=Intelligent LLM model router
      - WEBUI_AUTH=False
    volumes:
      - webui_data:/app/backend/data
    networks:
      - llx-network
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  # Monitoring stack
  grafana:
    image: grafana/grafana:latest
    container_name: llx-grafana-prod
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_SMTP_ENABLED=false
      - GF_LOG_LEVEL=info
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - llx-network
    restart: always
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:latest
    container_name: llx-prometheus-prod
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
      - ./backups/prometheus:/backups
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - llx-network
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: llx-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
      - ./backups/nginx:/backups
    networks:
      - llx-network
    restart: always
    depends_on:
      - llx-api
      - webui
      - grafana
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Backup service
  backup:
    image: postgres:15-alpine
    container_name: llx-backup-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST=postgres
    volumes:
      - ./backups:/backups
      - ./docker/backup/backup.sh:/backup.sh:ro
      - ./docker/backup/restore.sh:/restore.sh:ro
    networks:
      - llx-network
    restart: "no"
    depends_on:
      - postgres

networks:
  llx-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  webui_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local
  llx_cache:
    driver: local
  nginx_logs:
    driver: local
