name: "Refactoring Strategy"
version: "0.1.0"
project_type: "python"
domain: "software"

goal:
  short: "Reduce cyclomatic complexity and improve maintainability"
  quality:
    - "Reduce average CC by 30%"
    - "Achieve 80% test coverage"
    - "Zero new lint warnings"
  delivery:
    - "Complete in 2 sprints"
    - "All changes peer reviewed"
  metrics:
    - "Average CC < 5"
    - "Test coverage >= 80%"

sprints:
  - id: 1
    name: "Complexity Reduction Sprint"
    length_days: 14
    objectives:
      - "Identify top 20% most complex files"
      - "Apply extract method patterns"
      - "Introduce interfaces for tight coupling"
      - "Add unit tests for refactored components"
    tasks:
      - "complexity-analysis"
      - "extract-method"
      - "introduce-interface"
      - "add-unit-test"

  - id: 2
    name: "Cleanup and Standardization"
    length_days: 14
    objectives:
      - "Refactor moderate-complexity files"
      - "Eliminate duplicate code"
      - "Enforce linting standards"
      - "Final review and documentation"
    tasks:
      - "refactor-moderate"
      - "remove-duplicates"
      - "run-linter"
      - "peer-review"

tasks:
  patterns:
    - id: "complexity-analysis"
      type: "feature"
      title: "Run complexity analysis"
      description: "Run static analysis to compute cyclomatic complexity per function/file"
      priority: "high"
      model_hints:
        implementation: "balanced"

    - id: "extract-method"
      type: "tech_debt"
      title: "Extract complex methods"
      description: "Identify blocks >15 lines or nested >3 levels and move to a new method"
      priority: "high"
      model_hints:
        implementation: "balanced"

    - id: "introduce-interface"
      type: "tech_debt"
      title: "Introduce interface"
      description: "Decouple implementations by defining an interface and injecting dependencies"
      priority: "medium"
      model_hints:
        implementation: "balanced"

    - id: "add-unit-test"
      type: "feature"
      title: "Add unit tests"
      description: "Write tests for new/modified methods aiming for >=80% line coverage"
      priority: "high"
      model_hints:
        implementation: "cheap"

    - id: "refactor-moderate"
      type: "tech_debt"
      title: "Refactor moderate complexity"
      description: "Refactor remaining files with moderate complexity"
      priority: "medium"
      model_hints:
        implementation: "balanced"

    - id: "remove-duplicates"
      type: "tech_debt"
      title: "Remove duplicate code"
      description: "Eliminate duplicate code via utility functions or inheritance"
      priority: "medium"
      model_hints:
        implementation: "cheap"

    - id: "run-linter"
      type: "chore"
      title: "Run linter and formatter"
      description: "Apply project linter and auto-formatter to enforce style"
      priority: "low"
      model_hints:
        implementation: "cheap"

    - id: "peer-review"
      type: "documentation"
      title: "Peer review"
      description: "Submit changes for review with complexity reduction checklist"
      priority: "high"
      model_hints:
        implementation: "cheap"

quality_gates:
  - name: "Complexity Check"
    description: "Verify complexity reduction targets"
    criteria:
      - "Average cyclomatic complexity < 5 per function"
      - "Overall project complexity <= 10.4"
    required: true

  - name: "Test Coverage"
    description: "Ensure adequate test coverage"
    criteria:
      - "Test coverage >= 80% lines"
    required: true

  - name: "Code Quality"
    description: "No new quality issues"
    criteria:
      - "0 new lint warnings"
      - "All tests pass"
    required: true

  - name: "Review"
    description: "Peer review approval"
    criteria:
      - "All changes approved by at least one reviewer"
    required: true
